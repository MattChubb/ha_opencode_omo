# ==============================================================================
# nginx reverse proxy for OpenCode web UI mode
#
# Proxies HA ingress (port 8099) to the OpenCode web server (port 8100).
#
# The key problem: OpenCode web uses absolute paths (/session, /event, /assets/*)
# which bypass HA's ingress prefix (/api/hassio_ingress/<token>/). We fix this
# by serving a small external JS file that sets the API client's base URL to
# the full ingress path (external file required because HA ingress enforces
# CSP script-src 'self' which blocks inline scripts), plus a few sub_filters
# for static HTML asset references.
# ==============================================================================

worker_processes 1;
daemon off;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;

    # Temp paths writable without root
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099;
        server_name _;

        # ==================================================================
        # SSE endpoints — must not buffer so events stream to the client
        # ==================================================================
        location ~ ^/(global/event|event)$ {
            proxy_pass http://127.0.0.1:8100;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
            chunked_transfer_encoding off;
        }

        # ==================================================================
        # Ingress URL fix — serves a small JS file that tells the OpenCode
        # client to route API requests through the HA ingress path.
        #
        # WHY an external file?  HA ingress enforces
        #   Content-Security-Policy: script-src 'self' 'wasm-unsafe-eval'
        # which blocks inline <script> tags.  A file served from the same
        # origin (through ingress) satisfies 'self'.
        #
        # HOW it works:  The script reads location.pathname inside the
        # ingress iframe (e.g. /api/hassio_ingress/<token>/), extracts the
        # ingress prefix, and writes it into localStorage so the OpenCode
        # client uses the correct base URL for all API calls.
        # ==================================================================
        location = /ha-ingress-fix.js {
            default_type application/javascript;
            add_header Cache-Control 'no-cache';
            return 200 '(function(){var m=location.pathname.match(/^\/api\/hassio_ingress\/[^/]+/);if(m)localStorage.setItem("opencode.settings.dat:defaultServerUrl",location.origin+m[0])})()';
        }

        # ==================================================================
        # All other requests — proxy with HTML rewriting
        # ==================================================================
        location / {
            proxy_pass http://127.0.0.1:8100;
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;

            # Enable buffering so sub_filter can process responses.
            # SSE endpoints (handled above) bypass this.
            proxy_buffering on;

            # Rewrite HTML responses so absolute paths work behind HA ingress.
            # NOTE: text/html is the default for sub_filter_types, no need to
            # declare it explicitly (doing so causes a "duplicate MIME type" warning).
            sub_filter_once off;

            # 1. Inject a <script> tag that loads our ingress URL fix.
            #    The file is served by the location block above and satisfies
            #    CSP 'self'.  It sets localStorage so the OpenCode client
            #    routes all API requests through the ingress path.
            sub_filter '</head>' '<script src="ha-ingress-fix.js"></script></head>';

            # 2-4. Fix absolute asset references in HTML tags so the browser
            #      fetches them through ingress instead of from HA Core's root.
            sub_filter 'src="/' 'src="./';
            sub_filter 'href="/' 'href="./';
            sub_filter 'content="/' 'content="./';
        }
    }
}
