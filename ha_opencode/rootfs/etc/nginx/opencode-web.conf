# ==============================================================================
# nginx reverse proxy for OpenCode web UI mode
#
# Proxies HA ingress (port 8099) to the OpenCode web server (port 8100).
#
# The key problem: OpenCode web uses absolute paths (/session, /event, /assets/*)
# which bypass HA's ingress prefix (/api/hassio_ingress/<token>/). We fix this
# with a single localStorage injection that sets the API client's base URL to
# the full ingress path, plus a few sub_filters for static HTML asset references.
# ==============================================================================

worker_processes 1;
daemon off;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 128;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;

    # Temp paths writable without root
    client_body_temp_path /tmp/nginx_body;
    proxy_temp_path /tmp/nginx_proxy;
    fastcgi_temp_path /tmp/nginx_fastcgi;
    uwsgi_temp_path /tmp/nginx_uwsgi;
    scgi_temp_path /tmp/nginx_scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8099;
        server_name _;

        # ==================================================================
        # SSE endpoints — must not buffer so events stream to the client
        # ==================================================================
        location ~ ^/(global/event|event)$ {
            proxy_pass http://127.0.0.1:8100;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
            chunked_transfer_encoding off;
        }

        # ==================================================================
        # All other requests — proxy with HTML rewriting
        # ==================================================================
        location / {
            proxy_pass http://127.0.0.1:8100;
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;

            # Enable buffering so sub_filter can process responses.
            # SSE endpoints (handled above) bypass this.
            proxy_buffering on;

            # Rewrite HTML responses so absolute paths work behind HA ingress.
            sub_filter_types text/html;
            sub_filter_once off;

            # 1. Inject a script that tells the OpenCode API client to route
            #    all requests through the ingress path. The client reads its
            #    base URL from localStorage; we set it to the full ingress URL
            #    (e.g. http://ha:8123/api/hassio_ingress/AbCdEf123).
            #    This single line handles ALL API endpoints automatically.
            sub_filter '</head>' '<script>localStorage.setItem("opencode.settings.dat:defaultServerUrl",location.origin+location.pathname.replace(/\/$/,""))</script></head>';

            # 2-4. Fix absolute asset references in HTML tags so the browser
            #      fetches them through ingress instead of from HA Core's root.
            sub_filter 'src="/' 'src="./';
            sub_filter 'href="/' 'href="./';
            sub_filter 'content="/' 'content="./';
        }
    }
}
