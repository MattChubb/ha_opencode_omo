# ==============================================================================
# CodeNomad ingress routing - location block for inclusion in main nginx config
# Proxies /codenomad/* to CodeNomad server on port 3000
# ==============================================================================

# CodeNomad web interface
location /codenomad/ {
    # Strip /codenomad prefix when proxying
    rewrite ^/codenomad/(.*)$ /$1 break;
    
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
    
    # Disable buffering for SSE/streaming
    proxy_buffering off;
}

# CodeNomad assets (without prefix stripping)
location /codenomad {
    rewrite ^/codenomad$ /codenomad/ permanent;
}
