---
name: Update HAB CLI

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger for testing

jobs:
  update:
    name: Check and update HAB CLI version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest HAB CLI release
        id: latest
        run: |
          TAG=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/balloob/home-assistant-build-cli/releases/latest" \
            | jq -r '.tag_name')
          # Strip leading 'v' if present (download URL uses bare version e.g. 1.4.0)
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Latest HAB CLI: ${VERSION}"

      - name: Get current HAB CLI version
        id: current
        run: |
          VERSION=$(grep 'HAB_VERSION:' ha_opencode/build.yaml | sed 's/.*HAB_VERSION: "\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Current HAB CLI: ${VERSION}"

      - name: Update files if new version available
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          NEW="${{ steps.latest.outputs.version }}"
          sed -i "s/HAB_VERSION: \".*\"/HAB_VERSION: \"${NEW}\"/" ha_opencode/build.yaml
          sed -i "s/ARG HAB_VERSION=.*/ARG HAB_VERSION=${NEW}/" ha_opencode/Dockerfile

      - name: Open pull request
        if: steps.latest.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "update/hab-cli-${{ steps.latest.outputs.version }}"
          delete-branch: true
          commit-message: "chore: bump HAB CLI to ${{ steps.latest.outputs.version }}"
          title: "chore: bump HAB CLI ${{ steps.current.outputs.version }} → ${{ steps.latest.outputs.version }}"
          body: |
            Automated HAB CLI version bump.

            | | Version |
            |---|---|
            | Previous | `${{ steps.current.outputs.version }}` |
            | New | `${{ steps.latest.outputs.version }}` |

            [Release notes](https://github.com/balloob/home-assistant-build-cli/releases/tag/${{ steps.latest.outputs.version }})

            **Files updated:**
            - `ha_opencode/build.yaml`
            - `ha_opencode/Dockerfile`
